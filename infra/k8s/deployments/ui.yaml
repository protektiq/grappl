apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: grappl
  labels:
    app: ui
    app.kubernetes.io/name: ui
    app.kubernetes.io/part-of: grappl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
        app.kubernetes.io/name: ui
        app.kubernetes.io/part-of: grappl
    spec:
      containers:
        - name: ui
          image: grappl/ui:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - configMapRef:
                name: grappl-config
            - secretRef:
                name: grappl-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: grappl
  labels:
    app: ui
    app.kubernetes.io/name: ui
    app.kubernetes.io/part-of: grappl
spec:
  type: ClusterIP
  selector:
    app: ui
  ports:
    - name: http
      port: 80
      targetPort: http
