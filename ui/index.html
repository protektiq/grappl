<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GRAPPL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --black: #080808;
        --white: #f5f5f0;
        --scarlet: #c1121f;
        --grey-2: #2a2a2a;
        --grey-3: #444;
        --grey-4: #888;
        --font-display: "Bebas Neue", sans-serif;
        --font-serif: "Cormorant Garamond", serif;
        --font-mono: "DM Mono", monospace;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--black);
        color: var(--white);
        display: flex;
        flex-direction: column;
        font-family: var(--font-serif);
        font-weight: 300;
        position: relative;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        opacity: 0.24;
        background-image: radial-gradient(
            ellipse 60% 50% at 70% 40%,
            rgba(193, 18, 31, 0.12) 0%,
            transparent 70%
          ),
          linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.02) 1px,
            transparent 1px
          );
        background-size: auto, 80px 80px, 80px 80px;
      }

      header,
      main,
      footer {
        position: relative;
        z-index: 1;
      }

      header {
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        padding: 14px 20px;
      }

      nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .brand {
        font-family: var(--font-display);
        letter-spacing: 0.1em;
        font-size: 26px;
        text-decoration: none;
        color: var(--white);
      }

      .brand span {
        color: var(--scarlet);
      }

      .nav-links {
        display: flex;
        gap: 18px;
      }

      .nav-links a {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--grey-4);
        text-decoration: none;
      }

      .nav-links a:hover {
        color: var(--white);
      }

      main {
        flex: 1;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      h1 {
        margin: 0;
        text-align: center;
        font-family: var(--font-display);
        font-size: clamp(56px, 8vw, 120px);
        line-height: 0.92;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--white);
      }

      footer {
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding: 8px 20px;
        text-align: center;
        font-family: var(--font-serif);
        font-size: 14px;
        font-style: italic;
        color: var(--grey-4);
      }

      @media (max-width: 700px) {
        .nav-links {
          gap: 10px;
        }

        .nav-links a {
          font-size: 9px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <nav aria-label="Main navigation">
        <a class="brand" href="#" aria-label="GRAPPL home">GRAP<span>PL</span></a>
        <div class="nav-links">
          <a href="#">Sessions</a>
          <a href="#">Library</a>
          <a href="#">Settings</a>
        </div>
      </nav>
    </header>

    <main>
      <section aria-label="Pipeline status">
        <h1>Pipeline initializing...</h1>
      </section>
    </main>

    <footer>GRAPPL stack: UI placeholder shell</footer>
  </body>
</html>
