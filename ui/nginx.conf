server {
    listen 80;
    server_name _;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    types {
        text/css css;
        application/javascript js;
    }

    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        default_type text/plain;
        return 200 "ok";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
